<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Layer Portal | UniSaaS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="portal.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">UniSaaS<span>.</span></div>
            <nav class="side-nav" id="sidebar-nav">
                <!-- Nav items will be injected by JS -->
            </nav>
            <div class="user-pill">
                <div class="avatar" id="user-avatar">AD</div>
                <div class="user-info">
                    <span class="name" id="user-name">Administrator</span>
                    <span class="role" id="user-role-label">University Admin</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Management <span>Dashboard</span></h1>
                <div class="role-selector">
                    <select onchange="location.href='?role=' + this.value" id="demo-role-select">
                        <option value="university_admin">Switch Role: Admin</option>
                        <option value="teacher">Switch Role: Lecturer</option>
                        <option value="registration">Switch Role: Reception</option>
                        <option value="student">Switch Role: Student</option>
                    </select>
                </div>
            </header>

            <!-- Dynamic Sections -->
            <div id="dashboard-sections">
                <!-- Content will be injected by JS -->
            </div>
        </main>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'university_admin';
        document.getElementById('demo-role-select').value = role;

        const config = {
            university_admin: {
                title: "Global Management",
                roleName: "University Admin",
                avatar: "AD",
                nav: ["Overview", "Faculty", "Analytics", "Settings"],
                content: `
                    <div class="stats-grid">
                        <div class="stat-card"><h3>Total Students</h3><div class="gpa-value">1,240</div><p>+12% this month</p></div>
                        <div class="stat-card"><h3>Revenue</h3><div class="balance-value">$450K</div><p>Tuition Fall 2026</p></div>
                        <div class="stat-card"><h3>Staff</h3><div class="semester-value">84</div><p>Active Lecturers</p></div>
                    </div>
                `
            },
            teacher: {
                title: "Lecturer Portal",
                roleName: "Lecturer",
                avatar: "TR",
                nav: ["My Classes", "Assignments", "Gradebook", "Resources"],
                content: `
                    <div class="stats-grid">
                        <div class="stat-card"><h3>Active Courses</h3><div class="gpa-value">4</div><p>CS101, CS202, CS305, CS401</p></div>
                        <div class="stat-card"><h3>Pending Grades</h3><div class="balance-value">24</div><p>Submissions to review</p></div>
                        <div class="stat-card"><h3>Attendance</h3><div class="semester-value">94%</div><p>Average across classes</p></div>
                    </div>
                    <div class="content-grid">
                        <div class="courses-section">
                            <h2>My Class List</h2>
                            <div class="course-list">
                                <div class="course-item">💻 CS101 - Intro to Python (40 Students)</div>
                                <div class="course-item">🏗️ CS401 - System Arch (12 Students)</div>
                            </div>
                        </div>
                    </div>
                `
            },
            registration: {
                title: "Reception & Admissions",
                roleName: "Receptionist",
                avatar: "RP",
                nav: ["Registration", "Applications", "Payments", "Helpdesk"],
                content: `
                    <div class="stats-grid">
                        <div class="stat-card"><h3>New Apps</h3><div class="gpa-value">12</div><p>Pending Review</p></div>
                        <div class="stat-card"><h3>Daily Payments</h3><div class="balance-value">$12.4K</div><p>Processed Today</p></div>
                        <div class="stat-card"><h3>IDs Issued</h3><div class="semester-value">45</div><p>This week</p></div>
                    </div>
                `
            },
            student: {
                title: "Student Dashboard",
                roleName: "Student",
                avatar: "VS",
                nav: ["Overview", "Courses", "Grades", "Billing"],
                content: `
                    <div class="stats-grid">
                        <div class="stat-card"><h3>Current GPA</h3><div class="gpa-value">3.85</div><p>Top 5% of class</p></div>
                        <div class="stat-card"><h3>Balance</h3><div class="balance-value">$2.5K</div><p>Due by Oct 15</p></div>
                        <div class="stat-card"><h3>Matricule</h3><div class="semester-value">CU-001</div><p>Verified</p></div>
                    </div>
                `
            }
        };

        const active = config[role];
        document.getElementById('page-title').innerHTML = active.title + " <span>Dashboard</span>";
        document.getElementById('user-role-label').innerText = active.roleName;
        document.getElementById('user-avatar').innerText = active.avatar;
        document.getElementById('dashboard-sections').innerHTML = active.content;

        const navHtml = active.nav.map((item, i) => `<a href="#" class="${i===0?'active':''}">${item}</a>`).join('');
        document.getElementById('sidebar-nav').innerHTML = navHtml;
    </script>

    <style>
        .role-selector select {
            background: var(--glass);
            color: var(--text);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            outline: none;
        }
        .role-selector select option {
            background: var(--bg);
        }
    </style>
</body>
</html>
